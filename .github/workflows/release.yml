name: 🚀 Release - Build Binary & Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/jibclaw

jobs:
  release:
    name: 🏗️ Build Binary & Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Setup Go ──────────────────────────────
      - name: 🔧 Setup Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # ── Setup Node.js ─────────────────────────
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # ── Setup pnpm ────────────────────────────
      - name: 🔧 Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      # ── Run go generate ───────────────────────
      - name: 🔧 Run go generate
        run: go generate ./...

      # ── Build Frontend ────────────────────────
      - name: 🎨 Build Frontend
        run: |
          cd web/frontend
          pnpm install
          pnpm build:backend

      # ── Build jibclaw binary (Linux AMD64) ────
      - name: 🔨 Build jibclaw (Linux AMD64)
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-linux-amd64 ./cmd/picoclaw

      # ── Build jibclaw-launcher binary (Linux AMD64)
      - name: 🔨 Build jibclaw-launcher (Linux AMD64)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-launcher-linux-amd64 ./web/backend

      # ── Build jibclaw binary (Linux ARM64) ────
      - name: 🔨 Build jibclaw (Linux ARM64)
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o jibclaw-linux-arm64 ./cmd/picoclaw

      # ── Build jibclaw-launcher binary (Linux ARM64)
      - name: 🔨 Build jibclaw-launcher (Linux ARM64)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o jibclaw-launcher-linux-arm64 ./web/backend

      # ── Create archives ───────────────────────
      - name: 📦 Create Linux archives (tar.gz)
        run: |
          tar -czvf jibclaw_linux_amd64.tar.gz jibclaw-linux-amd64
          tar -czvf jibclaw-launcher_linux_amd64.tar.gz jibclaw-launcher-linux-amd64
          tar -czvf jibclaw_linux_arm64.tar.gz jibclaw-linux-arm64
          tar -czvf jibclaw-launcher_linux_arm64.tar.gz jibclaw-launcher-linux-arm64

      - name: 📦 Create Windows archives (zip)
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-windows-amd64.exe ./cmd/picoclaw
          zip jibclaw_windows_amd64.zip jibclaw-windows-amd64.exe

      - name: 📦 Create macOS archives (zip)
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-darwin-amd64 ./cmd/picoclaw
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o jibclaw-darwin-arm64 ./cmd/picoclaw
          zip jibclaw_darwin_amd64.zip jibclaw-darwin-amd64
          zip jibclaw_darwin_arm64.zip jibclaw-darwin-arm64

      # ── Create Release ────────────────────────
      - name: 📝 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jibclaw_linux_amd64.tar.gz
            jibclaw-launcher_linux_amd64.tar.gz
            jibclaw_linux_arm64.tar.gz
            jibclaw-launcher_linux_arm64.tar.gz
            jibclaw_windows_amd64.zip
            jibclaw_darwin_amd64.zip
            jibclaw_darwin_arm64.zip
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Set up QEMU ───────────────────────────
      - name: 📦 Set up QEMU
        uses: docker/setup-qemu-action@v4

      # ── Docker Buildx ─────────────────────────
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Login to GHCR ─────────────────────────
      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata (tags & labels) ──────────────
      - name: 🏷️ Prepare image tags
        id: tags
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          echo "ghcr_tag=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${tag}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      # ── Build & Push Docker Image ─────────────
      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.ghcr_tag }}
            ${{ steps.tags.outputs.ghcr_latest }}

          platforms: linux/amd64,linux/arm64
