name: 🚀 Release - Build Binary & Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/jibclaw

jobs:
  # ──────────────────────────────────────────────────────────
  # Build binaries for each platform
  # ──────────────────────────────────────────────────────────
  build-linux:
    name: 🐧 Build Linux Binaries
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 🔧 Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: 🔧 Run go generate
        run: go generate ./...

      - name: 🎨 Build Frontend
        run: |
          cd web/frontend
          pnpm install
          pnpm build:backend

      # Build jibclaw (Linux AMD64 & ARM64 - no CGO)
      - name: 🔨 Build jibclaw (Linux AMD64)
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-linux-amd64 ./cmd/picoclaw

      - name: 🔨 Build jibclaw (Linux ARM64)
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o jibclaw-linux-arm64 ./cmd/picoclaw

      # Build jibclaw-launcher (Linux AMD64 with CGO)
      - name: 🔨 Build jibclaw-launcher (Linux AMD64)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-launcher-linux-amd64 ./web/backend

      # Copy jibclaw to picoclaw for launcher archives
      - name: 📋 Copy jibclaw to picoclaw
        run: |
          cp jibclaw-linux-amd64 picoclaw

      - name: 📦 Create archives
        run: |
          # jibclaw archives (jibclaw only)
          tar -czvf jibclaw_linux_amd64.tar.gz jibclaw-linux-amd64
          tar -czvf jibclaw_linux_arm64.tar.gz jibclaw-linux-arm64
          # launcher archive (launcher + picoclaw) - AMD64 only due to CGO
          tar -czvf jibclaw-launcher_linux_amd64.tar.gz jibclaw-launcher-linux-amd64 picoclaw

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            jibclaw_linux_amd64.tar.gz
            jibclaw-launcher_linux_amd64.tar.gz
            jibclaw_linux_arm64.tar.gz

  build-windows:
    name: 🪟 Build Windows Binaries
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 🔧 Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: 🔧 Run go generate
        run: go generate ./...

      - name: 🎨 Build Frontend
        run: |
          cd web/frontend
          pnpm install
          pnpm build:backend

      - name: 🔨 Build jibclaw (Windows AMD64)
        run: |
          go build -ldflags="-s -w" -o jibclaw-windows-amd64.exe ./cmd/picoclaw

      - name: 🔨 Build jibclaw-launcher (Windows AMD64)
        run: |
          go build -ldflags="-s -w" -o jibclaw-launcher-windows-amd64.exe ./web/backend

      # Copy jibclaw to picoclaw for launcher archives
      - name: 📋 Copy jibclaw to picoclaw
        run: |
          Copy-Item jibclaw-windows-amd64.exe picoclaw.exe

      - name: 📦 Create archives
        run: |
          # jibclaw archive (jibclaw only)
          Compress-Archive -Path jibclaw-windows-amd64.exe -DestinationPath jibclaw_windows_amd64.zip
          # launcher archive (launcher + picoclaw)
          Compress-Archive -Path jibclaw-launcher-windows-amd64.exe, picoclaw.exe -DestinationPath jibclaw-launcher_windows_amd64.zip

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            jibclaw_windows_amd64.zip
            jibclaw-launcher_windows_amd64.zip

  build-macos:
    name: 🍎 Build macOS Binaries
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🔧 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 🔧 Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: 🔧 Run go generate
        run: go generate ./...

      - name: 🎨 Build Frontend
        run: |
          cd web/frontend
          pnpm install
          pnpm build:backend

      # Build jibclaw (AMD64 & ARM64)
      - name: 🔨 Build jibclaw (Darwin AMD64)
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-darwin-amd64 ./cmd/picoclaw

      - name: 🔨 Build jibclaw (Darwin ARM64)
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o jibclaw-darwin-arm64 ./cmd/picoclaw

      # Build jibclaw-launcher (Universal binary หรือแยก architecture)
      - name: 🔨 Build jibclaw-launcher (Darwin AMD64)
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o jibclaw-launcher-darwin-amd64 ./web/backend

      - name: 🔨 Build jibclaw-launcher (Darwin ARM64)
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o jibclaw-launcher-darwin-arm64 ./web/backend

      # Copy jibclaw to picoclaw for launcher archives (AMD64)
      - name: 📋 Copy jibclaw to picoclaw (AMD64)
        run: |
          cp jibclaw-darwin-amd64 picoclaw

      - name: 📦 Create archives (AMD64)
        run: |
          # jibclaw archive (jibclaw only)
          zip jibclaw_darwin_amd64.zip jibclaw-darwin-amd64
          # launcher archive (launcher + picoclaw)
          zip jibclaw-launcher_darwin_amd64.zip jibclaw-launcher-darwin-amd64 picoclaw

      # Copy jibclaw to picoclaw for launcher archives (ARM64)
      - name: 📋 Copy jibclaw to picoclaw (ARM64)
        run: |
          cp jibclaw-darwin-arm64 picoclaw

      - name: 📦 Create archives (ARM64)
        run: |
          # jibclaw archive (jibclaw only)
          zip jibclaw_darwin_arm64.zip jibclaw-darwin-arm64
          # launcher archive (launcher + picoclaw)
          zip jibclaw-launcher_darwin_arm64.zip jibclaw-launcher-darwin-arm64 picoclaw

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            jibclaw_darwin_amd64.zip
            jibclaw_darwin_arm64.zip
            jibclaw-launcher_darwin_amd64.zip
            jibclaw-launcher_darwin_arm64.zip

  # ──────────────────────────────────────────────────────────
  # Create Release with all binaries
  # ──────────────────────────────────────────────────────────
  release:
    name: 📝 Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: 📝 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # Build & Push Docker Image
  # ──────────────────────────────────────────────────────────
  docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Prepare image tags
        id: tags
        run: |
          tag="${{ github.ref_name }}"
          echo "ghcr_tag=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${tag}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.ghcr_tag }}
            ${{ steps.tags.outputs.ghcr_latest }}
          platforms: linux/amd64,linux/arm64
